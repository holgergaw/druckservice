version: 1.0

deployment:
  recurring:
    post-deployment-remote-commands:
      - mkdir -p $HOME/.deploy-now/uploads/models $HOME/.deploy-now/uploads/catalog
      - ln -sfn $HOME/.deploy-now/uploads $HOME/htdocs/uploads
      - php8.2-cli $HOME/htdocs/setup.php
  bootstrap:
    post-deployment-remote-commands:
      - mkdir -p $HOME/.deploy-now/uploads/models $HOME/.deploy-now/uploads/catalog
      - ln -sfn $HOME/.deploy-now/uploads $HOME/htdocs/uploads
      - php8.2-cli $HOME/htdocs/setup.php
