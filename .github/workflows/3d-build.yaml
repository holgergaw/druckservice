# To better understand this file read this:
# https://docs.ionos.space/docs/github-actions-customization/

name: "Deploy Now: Execute Build"

on:
  workflow_call:
    inputs:
      site-url:
        required: true
        type: string
      branch-id:
        required: true
        type: string

env:
  DEPLOYMENT_FOLDER: ./public

jobs:
# Please do not rename this job
  build-project:
    name: build 3d
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Prepare deployment
        run: |
          # Copy PHP backend into public/ for deployment
          cp -r src/ public/src/
          # Copy setup script
          cp setup.php public/setup.php
          # Security: block PHP execution in uploads dir
          mkdir -p public/uploads
          echo 'php_flag engine off' > public/uploads/.htaccess
          # Remove uploads content (symlink will be set post-deploy)
          find public/uploads -type f ! -name '.htaccess' -delete 2>/dev/null || true

      - name: Render templates
        uses: ionos-deploy-now/template-renderer-action@v2
        id: template
        with:
          input-directory: .deploy-now/3d
          output-directory: ${{ env.DEPLOYMENT_FOLDER }}
          intermediate-data-file: ${{ env.DEPLOYMENT_FOLDER }}/.template-renderer-data

# Please do not touch the following action
      - name: Store deployment content
        uses: ionos-deploy-now/artifact-action@v1
        with:
          api-key: ${{ secrets.IONOS_API_KEY }}
          service-host: api-eu.ionos.space
          project-id: 2093b2c9-2b00-4c7d-bbe3-8d85b5aa8624
          branch-id: ${{ inputs.branch-id }}
          version: ${{ github.sha }}
          folder: ${{ env.DEPLOYMENT_FOLDER }}
          config-file: .deploy-now/3d/config.yaml
          action: upload
